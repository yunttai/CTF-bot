name: Update CTF DB and Notify

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e .

      - name: Preserve previous snapshot DB
        run: |
          if [ -f data/ctf_snapshot.db ]; then
            cp data/ctf_snapshot.db "$RUNNER_TEMP/ctf_snapshot.previous.db"
          fi

      - name: Refresh snapshot DB
        run: python -m ctf_bot.updater

      - name: Notify Discord webhook about new contests
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m ctf_bot.notifier --previous-db "$RUNNER_TEMP/ctf_snapshot.previous.db" --current-db data/ctf_snapshot.db

      - name: Commit snapshot DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ctf_snapshot.db
          git commit --allow-empty -m "chore: refresh ctf snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
