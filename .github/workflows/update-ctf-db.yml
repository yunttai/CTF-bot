name: Update CTF DB and Notify

on:
  push:
    paths-ignore:
      - "data/ctf_snapshot.db"
  schedule:
    - cron: "40 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-ctf-db
  cancel-in-progress: false

jobs:
  update-db:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -e .

      - name: Refresh snapshot DB
        run: python -m ctf_bot.updater

      - name: Notify Discord webhook about new contests
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m ctf_bot.notifier --current-db data/ctf_snapshot.db

      - name: Commit snapshot DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ctf_snapshot.db
          git commit --allow-empty -m "chore: refresh ctf snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
